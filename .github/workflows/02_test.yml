name: Python Testing CI

on: [push, pull_request]

jobs:
  test-api:
    name: Tests unitaires et Couverture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov  # Nécessaire pour la couverture

      - name: Create dummy model for testing
        run: |
          python -c "import joblib; from sklearn.ensemble import RandomForestClassifier; import numpy as np; model = RandomForestClassifier().fit([[0,0,0,0]], [1]); joblib.dump(model, 'model.joblib')"

      - name: Run tests with pytest and coverage
        run: |
          pytest --cov=. --cov-report=html --cov-report=term > coverage.txt
          cat coverage.txt

      - name: Extract coverage percentage (Bonus)
        id: coverage_percent
        run: |
          # Extrait le pourcentage TOTAL du rapport texte
          PERCENT=$(grep "TOTAL" coverage.txt | awk '{print $NF}')
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  report:
    name: Rapport de fin
    needs: test-api
    runs-on: ubuntu-latest
    steps:
      - name: Display Success Message
        run: |
          echo "Le pipeline de test est terminé avec succès !"
          echo "Le rapport de couverture est disponible dans les artéfacts du workflow."

