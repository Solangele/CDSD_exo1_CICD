name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  # Job 1 : On s'assure que tout fonctionne avant de build
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install joblib scikit-learn
      - name: Create dummy model
        run: python -c "import joblib; from sklearn.ensemble import RandomForestClassifier; model = RandomForestClassifier().fit([[0,0,0,0]], [1]); joblib.dump(model, 'model.joblib')"
      - name: Run tests
        run: pytest

  # Job 2 : Construction et Publication
  build-push:
    name: Build and Push to Docker Hub
    needs: test # CRUCIAL : Ne se lance que si 'test' est vert
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Remplacez 'mon-api-ml' par le nom de votre choix
          tags: ${{ secrets.DOCKER_USERNAME }}/api-satisfaction:latest